<!DOCTYPE html>
<html lang="pt-br"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Anunciar Produto - Leilão Games</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div th:replace="~{fragments/cabecalho-site :: cabecalho}">
</div>

<main class="form-pagina">

    <section class="form-card">

        <div class="form-cabecalho">

            <i class="fa-solid fa-box-open"></i>

            <div>
                <h1>Anunciar produto</h1>
                <p>Preencha as informações do novo leilão.</p>
            </div>

        </div>

        <form class="form-grade"
              action="/anunciar"
              method="post"
              enctype="multipart/form-data"
              data-loading="true">

            <div class="campo campo-largo">

                <label for="nome">Nome do produto</label>

                <input id="nome"
                       type="text"
                       name="nome"
                       placeholder="Ex.: Console Nintendo 64"
                       maxlength="150"
                       required>

            </div>

            <div class="campo campo-largo">

                <label>Imagens do produto</label>

                <div class="upload-grade">

                    <div>
                        <span>Foto principal</span>
                        <input type="file"
                               name="foto1"
                               accept="image/*">
                    </div>

                    <div>
                        <span>Foto 2</span>
                        <input type="file"
                               name="foto2"
                               accept="image/*">
                    </div>

                    <div>
                        <span>Foto 3</span>
                        <input type="file"
                               name="foto3"
                               accept="image/*">
                    </div>

                </div>

            </div>

            <div class="campo">

                <label for="categoria">Categoria</label>

                <select id="categoria"
                        name="categoria.id"
                        required>

                    <option value=""
                            selected
                            disabled>
                        Selecione uma categoria
                    </option>

                    <option th:each="categoria : ${categorias}"
                            th:value="${categoria.id}"
                            th:text="${categoria.nome}">
                        Categoria
                    </option>

                </select>

            </div>

            <div class="campo">

                <label for="duracao">Duração do leilão</label>

                <select id="duracao"
                        name="diasLeilao"
                        required>

                    <option value="1">1 dia</option>
                    <option value="2">2 dias</option>
                    <option value="3" selected>3 dias</option>
                    <option value="4">4 dias</option>
                    <option value="5">5 dias</option>

                </select>

            </div>

            <div class="campo campo-largo">

                <label for="descricao">Descrição</label>

                <textarea id="descricao"
                          name="descricao"
                          maxlength="2000"
                          placeholder="Descreva o estado, características e detalhes do produto"
                          required>
                </textarea>

            </div>

            <div class="campo campo-largo">

                <label for="valorInicial">Valor inicial</label>

                <input id="valorInicial"
                       type="number"
                       step="0.01"
                       min="0.01"
                       inputmode="decimal"
                       name="valorInicial"
                       placeholder="0,00"
                       required>

            </div>

            <div class="form-acoes campo-largo">

                <a class="ui-botao ui-botao-perigo"
                   href="/"
                   data-loading="true">
                    Cancelar
                </a>

                <button class="btn"
                        type="submit"
                        th:disabled="${#lists.isEmpty(categorias)}">

                    <i class="fa-solid fa-upload"></i>

                    Publicar produto

                </button>

            </div>

        </form>

    </section>

</main>

<footer>
    © 2026 Leilão Games - Projeto TCC TADS
</footer>

</body>
</html>
