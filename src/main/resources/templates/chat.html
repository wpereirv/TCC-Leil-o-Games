<!DOCTYPE html>
<html lang="pt-br"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Chat - Leilão Games</title>

    <link rel="stylesheet" href="/css/style.css">

    <style>
        .chat-pagina {
            width: min(900px, 92%);
            margin: 40px auto;
        }

        .chat-card {
            background: rgba(255, 255, 255, 0.96);
            color: #151515;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.4);
        }

        .chat-cabecalho {
            padding: 22px;
            color: white;
            background: linear-gradient(90deg, #003b8f, #8f0000);
        }

        .chat-cabecalho h1 {
            margin-bottom: 8px;
            font-size: 25px;
        }

        .chat-cabecalho a {
            color: #ffd700;
            text-decoration: none;
        }

        .chat-cabecalho a:hover {
            text-decoration: underline;
        }

        .mensagens {
            height: 500px;
            padding: 24px;
            overflow-y: auto;
            background: #e9edf3;
        }

        .sem-mensagens {
            margin-top: 40px;
            color: #666;
            text-align: center;
        }

        .mensagem-linha {
            display: flex;
            margin-bottom: 16px;
        }

        .mensagem-linha.enviada {
            justify-content: flex-end;
        }

        .mensagem-linha.recebida {
            justify-content: flex-start;
        }

        .balao {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 15px;
            overflow-wrap: anywhere;
            box-shadow: 0 2px 7px rgba(0, 0, 0, 0.15);
        }

        .enviada .balao {
            color: white;
            background: #0057b8;
            border-bottom-right-radius: 3px;
        }

        .recebida .balao {
            color: #222;
            background: white;
            border-bottom-left-radius: 3px;
        }

        .balao strong {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
        }

        .balao p {
            margin: 0 0 7px;
            white-space: pre-wrap;
        }

        .balao time {
            display: block;
            font-size: 11px;
            text-align: right;
            opacity: 0.75;
        }

        .form-mensagem {
            display: flex;
            gap: 12px;
            padding: 18px;
            background: white;
        }

        .form-mensagem textarea {
            flex: 1;
            min-height: 55px;
            max-height: 130px;
            padding: 13px;
            border: 1px solid #aaa;
            border-radius: 10px;
            resize: vertical;
            font-size: 16px;
        }

        .form-mensagem button {
            padding: 0 25px;
            color: white;
            background: #d90429;
            border: 0;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        .form-mensagem button:hover {
            background: #a90020;
        }

        .voltar {
            display: inline-block;
            margin-top: 18px;
            color: white;
            text-decoration: none;
        }

        @media (max-width: 600px) {
            .mensagens {
                height: 430px;
                padding: 14px;
            }

            .balao {
                max-width: 86%;
            }

            .form-mensagem {
                flex-direction: column;
            }

            .form-mensagem button {
                min-height: 46px;
            }
        }
    </style>
</head>

<body>

<div th:replace="~{fragments/cabecalho-site :: cabecalho}">
</div>

<main class="chat-pagina">

    <section class="chat-card">

        <div class="chat-cabecalho">
            <h1>
                Conversa com
                <span th:text="${conversa.comprador.id == usuarioLogado.id
                    ? conversa.vendedor.nome
                    : conversa.comprador.nome}">
                    Usuário
                </span>
            </h1>

            <p>
                Produto:
                <a th:href="@{/produto/{id}(id=${conversa.produto.id})}"
                   th:text="${conversa.produto.nome}">
                    Produto
                </a>
            </p>
        </div>

        <div id="mensagens" class="mensagens">

            <p id="semMensagens"
            class="sem-mensagens"
            th:if="${#lists.isEmpty(mensagens)}">
                Ainda não existem mensagens. Comece a conversa!
            </p>

            <div th:each="mensagem : ${mensagens}"
                class="mensagem-linha"
                th:attr="data-mensagem-id=${mensagem.id}"
                 th:classappend="${mensagem.remetente.id == usuarioLogado.id}
                    ? 'enviada'
                    : 'recebida'">

                <div class="balao">

                    <strong th:text="${mensagem.remetente.id == usuarioLogado.id
                        ? 'Você'
                        : mensagem.remetente.nome}">
                        Usuário
                    </strong>

                    <p th:text="${mensagem.texto}">
                        Mensagem
                    </p>

                    <time th:text="${mensagem.dataHoraFormatada}">
                    Data e hora
                    </time>

                </div>
            </div>
        </div>

        <form id="formMensagem"
      class="form-mensagem"
      action="/chat/enviar"
      method="post">

            <input type="hidden"
                   name="conversaId"
                   th:value="${conversa.id}">

            <textarea id="textoMensagem"
          name="texto"
          maxlength="2000"
          placeholder="Digite sua mensagem..."
          required></textarea>

            <button type="submit">
                Enviar
            </button>
        </form>

    </section>

    <a class="voltar"
       th:href="@{/produto/{id}(id=${conversa.produto.id})}">
        ← Voltar para o produto
    </a>

</main>

<script th:inline="javascript">

    const conversaTempoRealId =
            /*[[${conversa.id}]]*/ null;

    const usuarioTempoRealId =
            /*[[${usuarioLogado.id}]]*/ null;

    const areaMensagens =
            document.getElementById(
                    "mensagens"
            );

    const formMensagem =
            document.getElementById(
                    "formMensagem"
            );

    const textoMensagem =
            document.getElementById(
                    "textoMensagem"
            );

    function rolarMensagens() {

        if (areaMensagens) {
            areaMensagens.scrollTop =
                    areaMensagens.scrollHeight;
        }
    }

    function adicionarMensagem(dados) {

        if (!areaMensagens) {
            return;
        }

        if (document.querySelector(
                '[data-mensagem-id="'
                + dados.id
                + '"]'
        )) {
            return;
        }

        const semMensagens =
                document.getElementById(
                        "semMensagens"
                );

        if (semMensagens) {
            semMensagens.remove();
        }

        const linha =
                document.createElement("div");

        const balao =
                document.createElement("div");

        const remetente =
                document.createElement("strong");

        const texto =
                document.createElement("p");

        const horario =
                document.createElement("time");

        const enviada =
                Number(dados.remetenteId)
                === Number(usuarioTempoRealId);

        linha.className =
                "mensagem-linha "
                + (enviada
                    ? "enviada"
                    : "recebida");

        linha.dataset.mensagemId =
                dados.id;

        balao.className = "balao";

        remetente.textContent =
                enviada
                        ? "Você"
                        : dados.remetenteNome;

        texto.textContent = dados.texto;

        horario.textContent =
                dados.dataHora;

        balao.appendChild(remetente);
        balao.appendChild(texto);
        balao.appendChild(horario);

        linha.appendChild(balao);

        areaMensagens.appendChild(linha);

        rolarMensagens();
    }

    const conexaoChat =
            new EventSource(
                    "/tempo-real?conversaId="
                    + conversaTempoRealId
            );

    conexaoChat.addEventListener(
            "mensagem",
            function (evento) {

                adicionarMensagem(
                        JSON.parse(evento.data)
                );
            }
    );

    formMensagem.addEventListener(
            "submit",
            async function (evento) {

                evento.preventDefault();

                const textoLimpo =
                        textoMensagem.value.trim();

                if (!textoLimpo) {
                    return;
                }

                const botao =
                        formMensagem.querySelector(
                                'button[type="submit"]'
                        );

                botao.disabled = true;

                try {

                    const resposta =
                            await fetch(
                                    formMensagem.action,
                                    {
                                        method: "POST",
                                        body: new FormData(
                                                formMensagem
                                        )
                                    }
                            );

                    if (!resposta.ok) {
                        throw new Error();
                    }

                    textoMensagem.value = "";

                } catch (erro) {

                    if (window.UI
                            && window.UI.toast) {

                        window.UI.toast(
                                "Não foi possível enviar a mensagem.",
                                "erro"
                        );
                    }

                } finally {

                    botao.disabled = false;
                    textoMensagem.focus();
                }
            }
    );

    window.addEventListener(
            "beforeunload",
            function () {
                conexaoChat.close();
            }
    );

    rolarMensagens();

</script>

</body>
</html>
