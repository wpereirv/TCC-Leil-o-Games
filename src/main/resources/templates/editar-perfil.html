<!DOCTYPE html>
<html lang="pt-br"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Editar Perfil - Leilão Games</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet"
          href="/css/style.css">

</head>

<body>

<div th:replace="~{fragments/cabecalho-site :: cabecalho}">
</div>

<main class="form-pagina">

    <section class="form-card">

        <div class="form-cabecalho">

            <i class="fa-solid fa-user-pen"></i>

            <div>
                <h1>Editar perfil</h1>
            </div>

        </div>

        <form class="form-grade"
              action="/perfil/editar"
              method="post"
              data-loading="true">

            <div class="campo campo-largo">

                <label for="nome">Nome</label>

                <input id="nome"
                       type="text"
                       name="nome"
                       maxlength="120"
                       th:value="${usuario.nome}"
                       required>

            </div>

            <div class="campo campo-largo">

                <label for="email">E-mail</label>

                <input id="email"
                       type="email"
                       name="email"
                       maxlength="180"
                       th:value="${usuario.email}"
                       required>

            </div>

            <div class="campo campo-largo">

                <label for="senhaAtual">
                    Senha atual
                </label>

                <input id="senhaAtual"
                       type="password"
                       name="senhaAtual"
                       maxlength="72"
                       required>

            </div>

            <div class="campo">

                <label for="novaSenha">
                    Nova senha
                </label>

                <input id="novaSenha"
                       type="password"
                       name="novaSenha"
                       minlength="6"
                       maxlength="72">

            </div>

            <div class="campo">

                <label for="confirmarSenha">
                    Confirmar nova senha
                </label>

                <input id="confirmarSenha"
                       type="password"
                       name="confirmarSenha"
                       minlength="6"
                       maxlength="72">

            </div>

            <div class="form-acoes campo-largo">

                <a class="ui-botao ui-botao-perigo"
                   href="/minha-conta"
                   data-loading="true">
                    Cancelar
                </a>

                <button class="btn"
                        type="submit">

                    <i class="fa-solid fa-floppy-disk"></i>

                    Salvar

                </button>

            </div>

        </form>

    </section>

</main>

<footer>
    © 2026 Leilão Games - Projeto TCC TADS
</footer>

</body>
</html>
