<header xmlns:th="http://www.thymeleaf.org"
        th:fragment="cabecalho"
        class="cabecalho-principal">

    <style th:fragment="estilosCabecalho">
        @import url('/css/ui.css');
        header.cabecalho-principal {
    width: 100%;
    min-height: 128px;
    padding: 16px 28px;
    display: grid;
    grid-template-columns: 320px 1fr 380px;
    align-items: center;
    gap: 22px;
    background: rgba(4, 7, 14, 0.97);
    border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    box-shadow: 0 8px 22px rgba(0, 0, 0, 0.28);
}

        .marca-site,
.marca-site:visited {
    width: 285px;
    min-height: 92px;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 12px 36px;
    color: white;
    text-decoration: none;
    isolation: isolate;
    transition:
        transform 0.25s ease,
        filter 0.25s ease;
}

.marca-site:hover {
    transform: translateY(-3px) scale(1.025);
    filter: brightness(1.13);
}

        .marca-site::before {
            content: "";
            position: absolute;
            z-index: -1;
            inset: 0;

            background: linear-gradient(
                120deg,
                rgba(0, 53, 126, 0.82),
                rgba(4, 7, 14, 0.95) 52%,
                rgba(100, 0, 12, 0.72)
            );

            border: 2px solid #ff243b;
            border-left-color: #36a5ff;
            border-radius: 10px;
            transform: skew(-12deg);
            box-shadow:
                0 8px 20px rgba(0, 0, 0, 0.3),
                inset 0 0 20px rgba(0, 0, 0, 0.28);

                background-size: 180% 180%;
                animation: movimentoMarca 7s ease-in-out infinite;
        }

        @keyframes movimentoMarca {
    0% {
        background-position: 0% 50%;
        box-shadow:
            0 8px 20px rgba(0, 0, 0, 0.3),
            0 0 8px rgba(54, 165, 255, 0.18);
    }

    50% {
        background-position: 100% 50%;
        box-shadow:
            0 10px 25px rgba(0, 0, 0, 0.38),
            0 0 18px rgba(255, 36, 59, 0.24);
    }

    100% {
        background-position: 0% 50%;
        box-shadow:
            0 8px 20px rgba(0, 0, 0, 0.3),
            0 0 8px rgba(54, 165, 255, 0.18);
    }
}
        .marca-leilao {
    color: white;
    font-family: "Arial Black", Arial, sans-serif;
    font-size: 37px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: 1px;
}

.marca-games {
    margin-top: 8px;
    margin-left: 80px;
    color: #ff243b;
    font-family: "Arial Black", Arial, sans-serif;
    font-size: 24px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: 5px;
}

        .cabecalho-navegacao {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 52px;
}

.cabecalho-navegacao a,
.cabecalho-navegacao a:visited {
    position: relative;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 4px;
    color: rgba(255, 255, 255, 0.92);
    text-decoration: none;
    font-size: 22px;
    font-weight: 700;
    white-space: nowrap;
}

        .cabecalho-navegacao a::after {
            content: "";
            position: absolute;
            right: 0;
            bottom: 3px;
            left: 0;
            height: 2px;
            background: linear-gradient(
                90deg,
                #36a5ff,
                #ff243b
            );
            transform: scaleX(0);
            transition: transform 0.2s ease;
        }

        .cabecalho-navegacao a:hover {
            color: white;
            transform: translateY(-2px);
        }

        .cabecalho-navegacao a:hover::after {
            transform: scaleX(1);
        }

        .icone-navegacao {
    width: 25px;
    height: 25px;
    flex-shrink: 0;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
}

        .cabecalho-principal > .login {
            min-width: 0;
            justify-self: end;
            justify-content: flex-end;
        }

        @media (max-width: 1050px) {
            .marca-site {
             width: 230px;
             min-height: 76px;
             padding: 10px 28px;
            }

            .marca-leilao {
            font-size: 30px;
            }

            .marca-games {
            margin-left: 62px;
            font-size: 19px;
            }

            header.cabecalho-principal {
                grid-template-columns: 250px 1fr;
            }

            .cabecalho-principal > .login {
                grid-column: 2;
                grid-row: 1;
            }

            .cabecalho-navegacao {
                grid-column: 1 / -1;
                grid-row: 2;
                padding-top: 8px;
                border-top: 1px solid rgba(255, 255, 255, 0.08);
            }
        }

        @media (max-width: 680px) {
            header.cabecalho-principal {
                padding: 14px 16px;
                grid-template-columns: 1fr;
            }

            .marca-site {
                width: 220px;
                margin: auto;
            }

            .cabecalho-principal > .login {
                grid-column: 1;
                grid-row: 2;
                justify-self: center;
                justify-content: center;
            }

            .cabecalho-navegacao {
                width: 100%;
                grid-column: 1;
                grid-row: 3;
                gap: 22px;
                overflow-x: auto;
            }

            .cabecalho-navegacao a {
                font-size: 15px;
            }

            .icone-navegacao {
                width: 19px;
                height: 19px;
            }
        }
    </style>

    <a th:fragment="marca"
    class="marca-site"
       href="/"
       aria-label="Página inicial do Leilão Games">

        <span class="marca-leilao">
            LEILÃO
        </span>

        <span class="marca-games">
            GAMES
        </span>

    </a>

    <nav class="cabecalho-navegacao"
         aria-label="Navegação principal">

        <a href="/">

            <svg class="icone-navegacao"
                 viewBox="0 0 24 24"
                 aria-hidden="true">

                <path d="M3 11.5 12 4l9 7.5"></path>
                <path d="M5 10v10h14V10"></path>
                <path d="M9 20v-6h6v6"></path>

            </svg>

            <span>Início</span>

        </a>

        <a href="/leiloes">

            <svg class="icone-navegacao"
                 viewBox="0 0 24 24"
                 aria-hidden="true">

                <path d="m14 4 6 6"></path>
                <path d="m11 7 6 6"></path>
                <path d="M4 20 14 10"></path>
                <path d="M2 22h9"></path>

            </svg>

            <span>Leilões</span>

        </a>

        <a href="/categorias">

            <svg class="icone-navegacao"
                 viewBox="0 0 24 24"
                 aria-hidden="true">

                <path d="M3 3h7l11 11-7 7L3 10V3z"></path>

                <circle cx="7.5"
                        cy="7.5"
                        r="1.5">
                </circle>

            </svg>

            <span>Categorias</span>

        </a>

    </nav>

    <div th:replace="~{fragments/usuario-cabecalho :: usuario}">
    </div>

    <div th:replace="~{fragments/feedback-global :: feedback}">
    </div>

</header>
